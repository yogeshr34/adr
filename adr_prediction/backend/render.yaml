services:
  - type: web
    name: adr-prediction-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    rootDir: adr_prediction/backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ADR_ALLOWED_ORIGINS
        value: "*"
      - key: ADR_MAX_UPLOAD_MB
        value: "15"
