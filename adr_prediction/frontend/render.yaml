services:
  - type: web
    name: adr-prediction-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    env: node
    rootDir: adr_prediction/frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://adr-prediction-api.onrender.com
        # Update this after backend deployment with actual backend URL
